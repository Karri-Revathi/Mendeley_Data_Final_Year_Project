<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI-Based Pneumonia Detection System</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-gray-200 min-h-screen flex items-center justify-center">

    <div class="bg-white/70 backdrop-blur-md shadow-xl rounded-2xl p-8 w-[400px] text-center border border-gray-200">

        <h1 class="text-2xl font-semibold text-gray-700 mb-2">
            Quantum-Based Pneumonia Detection
        </h1>

        <p class="text-gray-500 mb-6">
            Upload Chest X-ray Image
        </p>

        <form method="POST" enctype="multipart/form-data" class="space-y-4">
            
            <input 
                type="file" 
                name="file" 
                required
                class="block w-full text-sm text-gray-500 
                       file:mr-4 file:py-2 file:px-4
                       file:rounded-lg file:border-0
                       file:text-sm file:font-medium
                       file:bg-gray-200 file:text-gray-700
                       hover:file:bg-gray-300 cursor-pointer"
            >

            <button 
                type="submit"
                class="w-full py-2 rounded-lg bg-gradient-to-r from-gray-500 to-gray-600 
                       text-white font-medium hover:from-gray-600 hover:to-gray-700 
                       transition duration-300 shadow-md">
                Upload & Predict
            </button>

        </form>

        {% if image_file %}
        <div class="mt-6">
            <h3 class="text-gray-600 mb-2">Uploaded Image</h3>
            <img 
                src="{{ url_for('static', filename='uploads/' + image_file) }}" 
                class="w-64 mx-auto rounded-lg shadow-md border"
            >
        </div>
        {% endif %}

        {% if prediction %}
        <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">

            <h2 class="font-semibold text-lg
                {% if prediction.result == 'Normal' %}
                    text-green-600
                {% else %}
                    text-red-600
                {% endif %}
            ">
                Result: {{ prediction.result }}
            </h2>

            <h3 class="text-gray-600 mt-1">
                Confidence: {{ prediction.confidence }}
            </h3>

        </div>
        {% endif %}

        <div class="mt-6 text-sm text-gray-400">
            Powered by Hybrid Quantum CNN
        </div>

    </div>

</body>
</html>
